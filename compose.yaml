  docs_gpt:
    build:
      dockerfile: docs-gpt.Dockerfile
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:?}
      REDIS_HOST: 172.20.0.10
      REDIS_PORT: 7000
    depends_on:
      - redis_server_7000
      - redis_server_7001
      - redis_server_7002
      - redis_server_7003
      - redis_server_7004
      - redis_server_7005
      - redis_server_7006
      - redis_server_7007
      - redis_server_7008
    networks:
      - redis_network

networks:
  redis_network:
    ipam:
      config:
        - subnet: 172.20.0.0/24
